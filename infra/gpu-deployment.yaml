apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
spec:
  # If only one GPU schedules under capacity pressure, the app still reports Ready
  # (readyReplicas >= 1); the second pod stays Pending and shows as provisioning.
  replicas: 2
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
        inference.networking.k8s.io/engine-type: vllm
    spec:
      # GPU model servers run on the gpu-flex ComputeClass (G4 spot -> G4 on-demand
      # -> G2 spot -> G2 on-demand). See infra/computeclass-gpu.yaml.
      nodeSelector:
        cloud.google.com/compute-class: gpu-flex
        cloud.google.com/gke-gpu-driver-version: default
      tolerations:
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: vllm
        image: "vllm/vllm-openai:latest"
        imagePullPolicy: Always
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - "--model"
        - "${MODEL_NAME}"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "4096"
        # Block size must match the EPP's tokenProcessorConfig.blockSize (BLOCK_SIZE).
        - "--block-size"
        - "${BLOCK_SIZE}"
        - "--gpu-memory-utilization"
        - "0.90"
        # Publish KV-cache events over ZMQ for the llm-d precise prefix-cache indexer.
        - "--kv-events-config"
        - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557","topic":"kv@$(POD_IP):5557@${MODEL_NAME}"}'
        env:
        - name: PORT
          value: "8000"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 5557
          name: kv-events
          protocol: TCP
        livenessProbe:
          failureThreshold: 240
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 600
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /dev/shm
          name: shm
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
      restartPolicy: Always
