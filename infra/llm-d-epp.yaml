# llm-d precise prefix-cache routing EPP (Endpoint Picker), hand-rolled (no Helm).
#
# This is a drop-in replacement for the vanilla gateway-api-inference-extension
# EPP. It runs the llm-d endpoint-picker image, which adds event-driven precise
# prefix-cache routing: it consumes vLLM's KV-cache events over ZMQ and routes
# each request to the pod that physically holds the most of its prefix.
#
# Deploy alongside the vanilla EPP, verify it's healthy, then flip the
# InferencePool's endpointPickerRef to this Service (rollback = flip back).
#
#   kubectl apply -f infra/llm-d-epp.yaml
#   kubectl patch inferencepool vllm-server --type merge \
#     -p '{"spec":{"endpointPickerRef":{"name":"vllm-server-epp-llmd"}}}'
---
# ClusterIP for the model server, used by the EPP's token-producer to tokenize
# prompts via vLLM's /v1/completions/render (so block hashes match vLLM's).
apiVersion: v1
kind: Service
metadata:
  name: vllm-model-svc
  namespace: default
spec:
  selector:
    app: vllm-server
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-d-epp-config
  namespace: default
data:
  plugins.yaml: |
    apiVersion: llm-d.ai/v1alpha1
    kind: EndpointPickerConfig
    plugins:
      - type: token-producer
        parameters:
          modelName: ${MODEL_NAME}
          vllm:
            url: "http://vllm-model-svc:8000"
      - type: endpoint-notification-source
      - type: precise-prefix-cache-producer
        parameters:
          tokenProcessorConfig:
            blockSize: ${BLOCK_SIZE}   # must match vLLM --block-size (GPU default 16)
          speculativeIndexing: true
          indexerConfig:
            kvBlockIndexConfig:
              enableMetrics: true
          kvEventsConfig:
            topicFilter: "kv@"
            concurrency: 8
            discoverPods: true
            podDiscoveryConfig:
              socketPort: 5557      # must match vLLM --kv-events-config endpoint
      - type: prefix-cache-scorer
        parameters:
          prefixMatchInfoProducerName: precise-prefix-cache-producer
      - type: kv-cache-utilization-scorer
      - type: queue-scorer
      - type: no-hit-lru-scorer
    dataLayer:
      sources:
        - pluginRef: endpoint-notification-source
          extractors:
            - pluginRef: precise-prefix-cache-producer
    schedulingProfiles:
      - name: default
        plugins:
          # Make precise prefix-cache routing dominant: a pod that physically holds
          # the prefix (score ~1 * 15) wins over momentary load differences. New
          # prefixes match neither pod (prefix score 0 on both), so the small load
          # weights still spread them across pods.
          - pluginRef: prefix-cache-scorer
            weight: 15.0
          - pluginRef: kv-cache-utilization-scorer
            weight: 1.0
          - pluginRef: queue-scorer
            weight: 1.0
          - pluginRef: no-hit-lru-scorer
            weight: 1.0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server-epp-llmd
  namespace: default
  labels:
    app: vllm-server-epp-llmd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server-epp-llmd
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-server-epp-llmd
    spec:
      # Reuse the vanilla EPP's ServiceAccount (already has pods + inferencepools RBAC).
      serviceAccountName: vllm-server-epp
      containers:
      - name: epp
        # Pinned to an immutable digest for reproducibility/stability (was :main,
        # which is a moving dev tag). Re-pin by updating this digest deliberately.
        image: ghcr.io/llm-d/llm-d-router-endpoint-picker-dev@sha256:0f4606e7e87eacc0ccfb27690061929eebed8a27a8d5bfbab309bea19a6c692a
        imagePullPolicy: IfNotPresent
        args:
        - --pool-name
        - vllm-server
        - --pool-namespace
        - ${NAMESPACE}
        - --pool-group
        - inference.networking.k8s.io
        - --zap-encoder
        - json
        - --config-file
        - /config/plugins.yaml
        - --tracing=false
        - -v
        - "2"
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 9002
          name: grpc
        - containerPort: 9003
          name: grpc-health
        - containerPort: 9090
          name: metrics
        livenessProbe:
          grpc:
            port: 9003
            service: inference-extension
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 9003
            service: inference-extension
          periodSeconds: 5
        resources:
          requests:
            cpu: "500m"
            memory: 1Gi
          limits:
            memory: 2Gi
        volumeMounts:
        - name: plugins
          mountPath: /config
      volumes:
      - name: plugins
        configMap:
          name: llm-d-epp-config
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server-epp-llmd
  namespace: default
spec:
  selector:
    app: vllm-server-epp-llmd
  ports:
  - name: grpc-ext-proc
    port: 9002
    targetPort: 9002
    protocol: TCP
  - name: grpc-health
    port: 9003
    targetPort: 9003
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
