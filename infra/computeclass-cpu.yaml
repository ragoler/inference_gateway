# CPU Custom Compute Class: spot-preferred with family fallback.
# Model-server pods select this via nodeSelector cloud.google.com/compute-class: cpu-flex.
# Requires Node Auto-Provisioning enabled on the cluster.
#
# Fallback order (each spot -> on-demand):
#   e2  -> proven, broadly available (matches the existing demo cluster); listed first
#   e4  -> newer general-purpose family IF it exists (confirm — GCP families are e2/n2/n4/c4…)
#   n4  -> valid modern fallback so provisioning still succeeds if "e4" is unavailable
# n2 is an equally fine substitute for n4 if you prefer the broadest availability.
apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: cpu-flex
spec:
  priorities:
    - machineFamily: e2
      spot: true
    - machineFamily: e2
      spot: false
    - machineFamily: e4
      spot: true
    - machineFamily: e4
      spot: false
    - machineFamily: n4
      spot: true
    - machineFamily: n4
      spot: false
  nodePoolAutoCreation:
    enabled: true
  activeMigration:
    optimizeRulePriority: true
