kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: ${GATEWAY_NAME}
spec:
  # Internal regional L7 LB by default (gke-l7-rilb): the app reaches it over an
  # in-cluster internal IP, so the "with llm-d" path and the "without llm-d"
  # in-cluster ClusterIP path are apples-to-apples (no external hairpin penalty).
  # Override with GATEWAY_CLASS=gke-l7-regional-external-managed for a public IP.
  gatewayClassName: ${GATEWAY_CLASS}
  listeners:
  - name: http
    port: 80
    protocol: HTTP