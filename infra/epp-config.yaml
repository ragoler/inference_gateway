# Endpoint Picker (EPP) scheduling config.
#
# This OVERRIDES the ConfigMap created by the InferencePool Helm chart to make
# prefix-cache-aware routing dominant. By default the chart ships:
#   queue-scorer=2, kv-cache-utilization-scorer=2, prefix-cache-scorer=3
# When both pods are idle the queue/kv scores tie and cancel out, so the prefix
# scorer (weight 3) is supposed to decide -- but it is not always decisive, so a
# follow-up request on a cached context can land on the cold pod.
#
# Raising prefix-cache-scorer to 10 makes "route to the pod that holds your KV
# prefix" reliable. New contexts (which match neither pod) still load-balance
# normally because their prefix scores tie and queue/kv break the tie.
#
# Applied by setup_infra.sh after `helm install`, then the EPP is restarted.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${INFERENCE_POOL_NAME}-epp
  namespace: default
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: ${INFERENCE_POOL_NAME}
    meta.helm.sh/release-namespace: default
data:
  default-plugins.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: metrics-data-source
      parameters:
        scheme: "http"
        path: "/metrics"
        insecureSkipVerify: true
    - type: core-metrics-extractor
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 10
