# Once-per-cluster prerequisite for the inference-gateway feature.
#
# Installs the upstream gateway-api-inference-extension CRDs. The feature's manifests use:
#   * InferencePool  (inference.networking.k8s.io/v1)        -> provided natively by GKE
#   * InferenceObjective (inference.networking.x-k8s.io/v1alpha2) -> from this CRD bundle
#
# Pinned to the same GAIE_VERSION the standalone setup_infra.sh installs, so Hub-deployed
# and standalone clusters agree. The Hub applies this dir with `kubectl apply -k` at
# bootstrap (build_infra.sh, via paths.cluster_dir in feature.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/kubernetes-sigs/gateway-api-inference-extension/config/crd?ref=v1.5.0
