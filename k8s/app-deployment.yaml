apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-client-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-client-app
  template:
    metadata:
      labels:
        app: gateway-client-app
    spec:
      serviceAccountName: gateway-client-sa
      containers:
      - name: app
        image: "${REGISTRY}/gateway-client-app:${IMAGE_TAG}"
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        # The app resolves the in-cluster Gateway (and lists model pods) in its own
        # namespace. Inject it via the downward API so this works whether deployed
        # standalone (default) or by the Hub (the feature's namespace) — no templating.
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: GATEWAY_IP
          value: "${GATEWAY_IP}"
        - name: MODEL_NAME
          value: "${MODEL_NAME}"
        # Which hardware this cluster serves (shown in the UI). From .env.
        - name: BACKEND
          value: "${BACKEND}"
